# xremap configuration converted from sxhkd
# Save this as ~/.config/xremap/config.yml or similar

keymap:
  # Hyprland
  - name: "Hyprland window manager controls"
    remap:
      super-i:
        remap:
          # # Close window
          q:
            launch: ["hyprctl", "dispatch", "killactive", ""]

          # # Move active window to workspace
          # Shift-x:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "1"]
          # Shift-c:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "2"]
          # Shift-v:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "3"]
          # Shift-s:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "4"]
          # Shift-d:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "5"]
          # Shift-f:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "6"]
          # Shift-w:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "7"]
          # Shift-e:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "8"]
          # Shift-r:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "9"]
          # Shift-t:
            # launch: ["hyprctl", "dispatch", "movetoworkspace", "10"]

          # APPLICATION LAUNCHERS
          # Terminal
          t:
            launch: ["alacritty", "-t", "Alacritty"]
          # # Launcher (tofi)
          space:
            launch: ["tofi-drun", "--config", "/home/laznp/.config/tofi/launcher.config"]
          # Screenshot
          y:
            launch: ["sh", "-c", "grim -l 4 -g \"$(slurp)\" - | swappy -f -"]
          # Audio output menu
          a:
            launch: ["bash", "/home/laznp/.local/custom-bin/audio-output"]
          # Power menu
          z:
            launch: ["bash", "/home/laznp/.local/custom-bin/powermenu"]
          # Password menu
          p:
            launch: ["bash", "/home/laznp/.local/custom-bin/passwordmenu"]
